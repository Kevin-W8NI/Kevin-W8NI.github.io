<!DOCTYPE html>
<html>
<head>
<title>W8NI | Amateur Radio</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#05070b;
color:#00eaff;
text-align:center;
overflow-x:hidden;
}

.container{
margin-top:40px;
}

.profile{
width:140px;
border-radius:50%;
border:3px solid #00eaff;
box-shadow:0 0 20px #00eaff;
margin-bottom:10px;
}

.callsign{
font-size:48px;
font-weight:bold;
letter-spacing:4px;
text-shadow:0 0 15px #00eaff;
}

.grid{
font-size:18px;
margin-bottom:20px;
}

.panel{
display:inline-block;
border:1px solid #00eaff55;
padding:15px;
margin:10px;
border-radius:10px;
background:#0a0f18;
box-shadow:0 0 10px #00eaff33;
}

.buttons a{
display:inline-block;
margin:8px;
padding:10px 18px;
border-radius:6px;
border:1px solid #00eaff;
text-decoration:none;
color:#00eaff;
transition:0.3s;
}

.buttons a:hover{
background:#00eaff;
color:#000;
box-shadow:0 0 10px #00eaff;
}

.morse{
margin-top:25px;
font-family:monospace;
font-size:20px;
letter-spacing:3px;
}

.wave{
position:fixed;
bottom:0;
left:0;
width:100%;
height:120px;
background:linear-gradient(transparent,#00eaff22);
animation:wave 6s infinite linear;
opacity:0.4;
}

@keyframes wave{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

</style>
</head>

<body>

<div class="container">

<img src="kevin.jpg" class="profile">

<div class="callsign">W8NI</div>
<div class="grid">Grid EN71</div>

<div class="panel">
UTC Time<br>
<span id="utcClock">loading...</span>
</div>

<div class="panel">
Solar Conditions<br>
<span id="solar">loading...</span>
</div>

<div class="buttons">

<a href="https://www.qrz.com/db/W8NI" target="_blank">QRZ</a>

<a href="https://pota.app/#/profile/W8NI" target="_blank">POTA</a>

<a href="mailto:w8ni@yahoo.com">Email</a>

<a href="W8NI.vcf">Save Contact</a>

</div>

<div class="morse" id="morse"></div>

</div>

<div class="wave"></div>

<script>

function updateUTC(){
let now = new Date();
let utc = now.toUTCString().split(" ")[4];
document.getElementById("utcClock").innerHTML = utc;
}

setInterval(updateUTC,1000);
updateUTC();


async function getSolar(){

try{

let response = await fetch("https://www.hamqsl.com/solarxml.php");

let text = await response.text();

let parser = new DOMParser();
let xml = parser.parseFromString(text,"text/xml");

let sfi = xml.getElementsByTagName("solarflux")[0].textContent;
let kp = xml.getElementsByTagName("kindex")[0].textContent;

document.getElementById("solar").innerHTML =
"SFI: "+sfi+" | Kp: "+kp;

}catch(e){

document.getElementById("solar").innerHTML =
"Solar data unavailable";

}

}

getSolar();
setInterval(getSolar,300000);


const morseText = "... --- ...   .-- ---.. -. ..";
let i=0;

function morseAnim(){

document.getElementById("morse").innerHTML =
morseText.substring(0,i);

i++;

if(i>morseText.length){i=0;}

}

setInterval(morseAnim,120);


setTimeout(function(){
let link=document.createElement("a");
link.href="W8NI.vcf";
link.download="W8NI.vcf";
document.body.appendChild(link);
link.click();
document.body.removeChild(link);
},1500);

</script>

</body>
</html>
