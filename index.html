<!DOCTYPE html>
<html>
<head>
  <title>W8NI | Amateur Radio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: url('LdgWallpaper.jpg') no-repeat center center fixed;
  background-size: cover;
  color: #00eaff;
  overflow-x: hidden;
    }

    /* Background RF waveform */
    body::before {
      content: "";
      position: fixed;
      width: 200%;
      height: 200%;
      top: -50%;
      left: -50%;
      background: radial-gradient(circle at center, rgba(0,234,255,0.05), transparent 70%);
      animation: pulse 6s infinite alternate;
      z-index: -1;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to { transform: scale(1.1); }
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 40px 20px;
      text-align: center;
    }

    h1 {
      font-size: 3em;
      letter-spacing: 4px;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #66f7ff;
      margin-bottom: 30px;
    }

    .panel {
      background: #111822;
      padding: 20px;
      margin: 15px 0;
      border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,234,255,0.2);
    }

    .buttons a {
      display: block;
      margin: 10px auto;
      padding: 12px;
      width: 260px;
      background: #0f2530;
      border: 1px solid #00eaff;
      color: #00eaff;
      text-decoration: none;
      border-radius: 6px;
      transition: 0.2s;
    }

    .buttons a:hover {
      background: #003b46;
      box-shadow: 0 0 10px #00eaff;
    }

    .morse {
      font-family: monospace;
      letter-spacing: 3px;
      font-size: 1.2em;
      margin-top: 10px;
      animation: blink 1.2s infinite;
    }

    @keyframes blink {
      50% { opacity: 0.3; }
    }

    footer {
      margin-top: 40px;
      font-size: 0.8em;
      color: #66cdd4;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>W8NI</h1>
  <div class="subtitle">Grid EN71 | ITU Zone 8 | CQ Zone 4</div>

  <div id="nfcMessage" style="
margin-top:15px;
background:#0f2530;
padding:10px;
border:1px solid #00eaff;
border-radius:6px;
display:none;
font-size:0.9em;">
👋 Thanks for tapping my card! Log our contact below.
</div>
  
  <div class="panel">
    <strong>UTC Time</strong>
    <div id="utcClock" style="font-size:1.4em;margin-top:8px;"></div>
  </div>

  <div class="panel">
    <strong>Morse ID</strong>
    <div class="morse">.-- ---.. -. ..</div>
  </div>

  <div class="buttons">
    <a href="https://www.qrz.com/db/W8NI" target="_blank">🌐 QRZ Profile</a>
    <a href="https://pota.app/#/profile/W8NI" target="_blank">⛺ POTA Activations</a>
    <a href="https://www.instagram.com/kevinw8ni" target="_blank">📱 Instagram</a>
    <a href="mailto:w8ni@yahoo.com">✉️ Email W8NI</a>
    <a href="W8NI.vcf" download>📇 Save Contact</a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdd2vu5twcMiYUWuVLL9qsXj83PqKlfR5_Jn26n3aCDh8mNFA/viewform?usp=sharing&ouid=102515000487548442292" target="_blank">Tap to Log Contact</a>

  </div>

  <footer>
    73 — See you on the waterfall.
  </footer>

</div>

  <script>
 // NFC Message
    const params = new URLSearchParams(window.location.search);

if (params.get("nfc") === "true") {
  document.getElementById("nfcMessage").style.display = "block";
}
  // Live UTC Clock
  function updateUTC() {
    const now = new Date();
    document.getElementById("utcClock").textContent =
      now.toUTCString().split(" ")[4] + " UTC";
  }
  setInterval(updateUTC, 1000);
  updateUTC();
const canvas = document.getElementById("waterfall");
const ctx = canvas.getContext("2d");

canvas.width = canvas.offsetWidth;
canvas.height = canvas.offsetHeight;

</script>

</body>
</html>
